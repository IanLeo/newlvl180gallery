<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; cursor: grab; position: fixed; inset: 0; z-index: 3; opacity: 1; transition: opacity 320ms ease; }
canvas.dragging { cursor: grabbing; }
.site-title {
  position: fixed;
  top: 22px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 40;
  display: inline-block;
  color: #fff;
  font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.02em;
  pointer-events: none;
  user-select: none;
}

.viewer {
  position: fixed;
  inset: 0;
  --viewer-vpad: clamp(118px, 14vh, 156px);
  --viewer-strip-h: 96px;
  z-index: 30;
  display: block;
  pointer-events: none;
  opacity: 0;
  transition: opacity 260ms ease;
  background: #000;
}
.viewer.open { pointer-events: auto; opacity: 1; }
.viewer-main-wrap {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  overflow: hidden;
  pointer-events: none;
}
.viewer-hero-track {
  height: calc(100vh - (var(--viewer-vpad) * 2));
  display: inline-flex;
  align-items: center;
  gap: 20px;
  transform: translateX(0);
  transition: transform 280ms ease-in-out;
}
.viewer-main {
  height: 100%;
  width: auto;
  max-width: 96vw;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  transition: opacity 220ms ease-in-out;
}
.viewer-side-img {
  height: 100%;
  width: auto;
  max-width: 70vw;
  object-fit: contain;
  opacity: 0.38;
  user-select: none;
  -webkit-user-drag: none;
}
.viewer-edge-fade {
  position: absolute;
  top: 0;
  bottom: var(--viewer-strip-h);
  width: 32vw;
  z-index: 2;
  pointer-events: none;
}
.viewer-edge-fade.left {
  left: 0;
  background: linear-gradient(to left, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 88%, rgba(0,0,0,0.94) 100%);
}
.viewer-edge-fade.right {
  right: 0;
  background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 88%, rgba(0,0,0,0.94) 100%);
}
.viewer.switch-next .viewer-hero-track { transform: translateX(-48px); }
.viewer.switch-prev .viewer-hero-track { transform: translateX(48px); }
.viewer-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: var(--viewer-strip-h);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
  overflow-y: hidden;
  overscroll-behavior-x: contain;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  pointer-events: auto;
  touch-action: pan-x;
  background: linear-gradient(to top, rgba(0,0,0,0.72), rgba(0,0,0,0));
  transition: opacity 180ms ease;
}
.viewer-thumb {
  flex: 0 0 auto;
  width: 62px;
  height: 76px;
  border: 0;
  background: transparent;
  opacity: 0.62;
  cursor: pointer;
}
.viewer-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.viewer-thumb.active { opacity: 1; }
.viewer-nav {
  position: absolute;
  top: 0;
  bottom: var(--viewer-strip-h);
  width: 50%;
  z-index: 2;
}
.viewer-nav-left { left: 0; }
.viewer-nav-right { right: 0; }
.viewer-close {
  position: fixed;
  top: 8px;
  right: 8px;
  z-index: 35;
  width: 128px;
  height: 128px;
  border: 0;
  border-radius: 16px;
  background: transparent;
  color: #fff;
  padding: 0;
  cursor: pointer;
}
.viewer-close svg { width: 116px; height: 116px; display: block; margin: 6px; }
.viewer-close line {
  stroke: rgba(255,255,255,0.95);
  stroke-width: 1.35938;
  stroke-linecap: round;
}
.viewer-transit {
  position: fixed;
  z-index: 50;
  pointer-events: none;
  transform-origin: 0 0;
  display: none;
}

.mode-toggle {
  position: fixed;
  top: 14px;
  right: 16px;
  z-index: 24;
  border: 0;
  border-radius: 18px;
  width: 128px;
  height: 128px;
  padding: 0;
  background: rgba(0,0,0,0.28);
  -webkit-backdrop-filter: blur(30px);
  backdrop-filter: blur(30px);
  box-shadow: 0 0 36px rgba(0,0,0,0.5), 0 0 62px rgba(0,0,0,0.32);
  color: #fff;
  cursor: pointer;
  transition: background-color 260ms ease;
}
.mode-toggle svg { width: 100px; height: 100px; display: block; margin: 14px; }
.mode-toggle .morph-base { stroke: rgba(255,255,255,0.95); fill: none; stroke-linecap: round; stroke-linejoin: round; }
.mode-toggle .sphere-g,
.mode-toggle .grid-g { transform-origin: 64px 64px; transition: transform 300ms ease, opacity 240ms ease; }
.mode-toggle .sphere-g { opacity: 1; transform: rotate(0deg) scale(1); }
.mode-toggle .grid-g { opacity: 0; transform: rotate(-12deg) scale(0.74); }
.mode-toggle.grid .sphere-g { opacity: 0; transform: rotate(14deg) scale(0.72); }
.mode-toggle.grid .grid-g { opacity: 1; transform: rotate(0deg) scale(1); }

.grid-mode {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: block;
  visibility: visible;
  pointer-events: none;
  opacity: 0;
  transition: opacity 320ms ease;
  padding: 74px 20px 20px;
}
.grid-mode.open {
  pointer-events: auto;
  opacity: 1;
}
.grid-wrap {
  position: relative;
  width: 100%;
}
.grid-item {
  position: absolute;
  border: 0;
  background: transparent;
  cursor: pointer;
}
.grid-item img {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const EDGE_BLUR_BUFFER_SCALE = 0.28;
const EDGE_BLUR_PX = 30;
const edgeBlurCanvas = document.createElement("canvas");
const edgeBlurCtx = edgeBlurCanvas.getContext("2d");
const edgeMaskCanvas = document.createElement("canvas");
const edgeMaskCtx = edgeMaskCanvas.getContext("2d");
function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  const bw = Math.max(8, Math.floor(W * EDGE_BLUR_BUFFER_SCALE));
  const bh = Math.max(8, Math.floor(H * EDGE_BLUR_BUFFER_SCALE));
  edgeBlurCanvas.width = bw;
  edgeBlurCanvas.height = bh;
  edgeMaskCanvas.width = W;
  edgeMaskCanvas.height = H;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('resize', () => {
  if (viewMode === "grid" || modeMorph > 0.001) renderGridMode();
});

const N = 180, FPS = 60;
const HOVER_RADIUS = 60, SCALE_MAX = 1.5, SCALE_SPEED = 0.12;
const HOVER_POP_SCALE = 1.12, HOVER_LIFT_PX = 20;
const ZOOM_MIN = 0.65, ZOOM_MAX = 2.2;
const DEFAULT_ZOOM = 1.85;
const AUTO_ROT_SPEED = 0.00011;
const IMAGE_MANIFEST_URL = "images/manifest.json";
const GRID_COLS = 5, GRID_GAP = 20;

// Mouse state
let mouse = { x: -9999, y: -9999 };
let drag = { active: false, lastX: 0, lastY: 0, velX: 0, velY: 0 };
let pointerDownMoved = false;
let hoverItem = null;
let renderedItems = [];
let zoom = DEFAULT_ZOOM, targetZoom = DEFAULT_ZOOM;
let pinch = { active: false, startDist: 0, startZoom: 1 };
let viewerItems = [];
let viewerOpen = false;
let viewerIndex = 0;
let viewerAnimating = false;
let viewerSwitchTimer = null;
let viewMode = "sphere";
let modeMorph = 0;
let modeMorphFrom = 0;
let modeMorphTo = 0;
let modeMorphStartMs = 0;
let modeMorphDurationMs = 560;
let modeMorphScrollY = 0;
let gridOrderIds = [];
let morphOrderIds = null;
let morphGridSrcOrder = null;
let pendingGridOrderBuild = false;

const viewerEl = document.createElement("div");
viewerEl.className = "viewer";
viewerEl.innerHTML = `
  <button class="viewer-close" type="button" aria-label="Close">
    <svg viewBox="0 0 116 116" aria-hidden="true">
      <line x1="18" y1="18" x2="98" y2="98"></line>
      <line x1="98" y1="18" x2="18" y2="98"></line>
    </svg>
  </button>
  <div class="viewer-nav viewer-nav-left"></div>
  <div class="viewer-nav viewer-nav-right"></div>
  <div class="viewer-main-wrap">
    <div class="viewer-hero-track">
      <img class="viewer-side-img viewer-side-left-img" alt="">
      <img class="viewer-main" alt="">
      <img class="viewer-side-img viewer-side-right-img" alt="">
    </div>
    <div class="viewer-edge-fade left"></div>
    <div class="viewer-edge-fade right"></div>
  </div>
  <div class="viewer-strip"></div>
`;
document.body.appendChild(viewerEl);
const viewerMain = viewerEl.querySelector(".viewer-main");
const viewerHeroTrack = viewerEl.querySelector(".viewer-hero-track");
const viewerSideLeftImg = viewerEl.querySelector(".viewer-side-left-img");
const viewerSideRightImg = viewerEl.querySelector(".viewer-side-right-img");
const viewerStrip = viewerEl.querySelector(".viewer-strip");
const viewerClose = viewerEl.querySelector(".viewer-close");
const viewerNavLeft = viewerEl.querySelector(".viewer-nav-left");
const viewerNavRight = viewerEl.querySelector(".viewer-nav-right");
const viewerTransit = document.createElement("img");
viewerTransit.className = "viewer-transit";
document.body.appendChild(viewerTransit);

const siteTitle = document.createElement("div");
siteTitle.className = "site-title";
siteTitle.textContent = "NewLVL360°";
document.body.appendChild(siteTitle);

const modeToggle = document.createElement("button");
modeToggle.className = "mode-toggle";
modeToggle.type = "button";
modeToggle.setAttribute("aria-label", "Switch view mode");
modeToggle.innerHTML = `
<svg viewBox="0 0 128 128" aria-hidden="true">
  <g class="morph-base sphere-g">
    <path d="M29.2001 6V122M52.4 6V122M75.6 6V122M98.7999 6V122M6 60.375H29.2002M6 30.4687L29.2002 30.4688M6 97.5312H29.2002M29.2002 38.625L52.3999 38.625M29.2002 83.0312H52.3999M52.3999 30.4687L75.6001 30.4688M52.2188 60.375H75.3281M52.2188 83.0312H75.3281M75.6001 38.625L122 38.625M75.6001 97.5312H98.7998M75.6001 67.7261L98.7998 67.7261M98.7999 83.0312H122M6 6H122V122H6V6Z" stroke-width="1.35938"></path>
  </g>
  <g class="morph-base grid-g">
    <path d="M128 64C128 99.3462 99.3462 128 64 128M128 64C128 28.6538 99.3462 0 64 0M128 64C128 38.0426 99.3462 17 64 17C28.6538 17 -1.13463e-06 38.0426 0 64M128 64C128 89.9574 99.3462 111 64 111C28.6538 111 1.13463e-06 89.9574 0 64M128 64C128 51.8497 99.3462 42 64 42C28.6538 42 -5.31105e-07 51.8497 0 64M128 64C128 76.1503 99.3462 86 64 86C28.6538 86 5.31105e-07 76.1503 0 64M64 128C28.6538 128 0 99.3462 0 64M64 128C89.9574 128 111 99.3462 111 64C111 28.6538 89.9574 0 64 0M64 128C38.0426 128 17 99.3462 17 64C17 28.6538 38.0426 0 64 0M64 128C76.1503 128 86 99.3462 86 64C86 28.6538 76.1503 0 64 0M64 128C51.8497 128 42 99.3462 42 64C42 28.6538 51.8497 0 64 0M0 64C0 28.6538 28.6538 0 64 0" stroke-width="1.5"></path>
  </g>
</svg>`;
document.body.appendChild(modeToggle);

const gridMode = document.createElement("section");
gridMode.className = "grid-mode";
gridMode.innerHTML = `<div class="grid-wrap"></div>`;
document.body.appendChild(gridMode);
const gridWrap = gridMode.querySelector(".grid-wrap");

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function touchDistance(t0, t1) { return Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY); }

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (drag.active) {
    if (Math.abs(e.clientX - drag.lastX) + Math.abs(e.clientY - drag.lastY) > 1) pointerDownMoved = true;
    drag.velX = e.clientX - drag.lastX;
    drag.velY = e.clientY - drag.lastY;
    rotY += drag.velX * 0.005;
    rotX -= drag.velY * 0.005;
    rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    drag.lastX = e.clientX; drag.lastY = e.clientY;
  }
});
canvas.addEventListener('mousedown', e => {
  drag.active = true; drag.lastX = e.clientX; drag.lastY = e.clientY;
  drag.velX = 0; drag.velY = 0;
  pointerDownMoved = false;
  canvas.classList.add('dragging');
});
canvas.addEventListener('mouseup', e => {
  drag.active = false;
  canvas.classList.remove('dragging');
  if (viewerOpen) return;
  if (!pointerDownMoved) {
    const hit = pickTopItem(e.clientX, e.clientY);
    if (hit) openViewerByMedia(hit.d.media, hit);
  }
});
canvas.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; drag.active = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetZoom = clamp(targetZoom * Math.exp(-e.deltaY * 0.0012), ZOOM_MIN, ZOOM_MAX);
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', e => {
  if (e.touches.length >= 2) {
    pinch.active = true;
    pinch.startDist = touchDistance(e.touches[0], e.touches[1]);
    pinch.startZoom = targetZoom;
    pointerDownMoved = true;
    drag.active = false;
    return;
  }
  const t = e.touches[0];
  drag.active = true; drag.lastX = t.clientX; drag.lastY = t.clientY;
  drag.velX = 0; drag.velY = 0;
  pointerDownMoved = false;
  mouse.x = t.clientX; mouse.y = t.clientY;
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length >= 2) {
    pinch.active = true;
    pointerDownMoved = true;
    const dist = touchDistance(e.touches[0], e.touches[1]);
    if (pinch.startDist > 0) targetZoom = clamp(pinch.startZoom * (dist / pinch.startDist), ZOOM_MIN, ZOOM_MAX);
    mouse.x = (e.touches[0].clientX + e.touches[1].clientX) * 0.5;
    mouse.y = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
    return;
  }
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY;
  if (Math.abs(t.clientX - drag.lastX) + Math.abs(t.clientY - drag.lastY) > 1) pointerDownMoved = true;
  drag.velX = t.clientX - drag.lastX; drag.velY = t.clientY - drag.lastY;
  rotY += drag.velX * 0.005; rotX -= drag.velY * 0.005;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  drag.lastX = t.clientX; drag.lastY = t.clientY;
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinch.active = false;
  drag.active = false;
  if (viewerOpen) return;
  if (!pointerDownMoved) {
    const hit = pickTopItem(mouse.x, mouse.y);
    if (hit) openViewerByMedia(hit.d.media, hit);
  }
});

function hash(n) { return ((Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1 + 1) % 1; }

function breathRadius() {
  return Math.min(W, H) * 0.42;
}

function placeOnSphere(i) {
  const y = 1 - (2 * (i + 0.5)) / N;
  const r = Math.sqrt(Math.max(0, 1 - y * y));
  const golden = Math.PI * (3 - Math.sqrt(5));
  const theta = i * golden + (hash(i * 13.17 + 0.2) - 0.5) * 0.06;
  const x = Math.cos(theta) * r;
  const z = Math.sin(theta) * r;
  return { phi: Math.acos(clamp(y, -1, 1)), theta: Math.atan2(z, x) };
}

function svgThumb(seed, aspect) {
  const w = Math.round(120 * Math.max(0.55, Math.min(1.8, aspect)));
  const h = 120;
  const h1 = Math.floor(hash(seed + 1.1) * 360);
  const h2 = Math.floor((h1 + 40 + hash(seed + 3.1) * 120) % 360);
  const h3 = Math.floor((h2 + 40 + hash(seed + 5.1) * 120) % 360);
  const a = (hash(seed + 7.7) * 0.5 + 0.25).toFixed(2);
  const a2 = (hash(seed + 8.9) * 0.4 + 0.15).toFixed(2);
  const x1 = Math.floor(hash(seed + 9.3) * w), y1 = Math.floor(hash(seed + 10.3) * h);
  const x2 = Math.floor(hash(seed + 11.3) * (w - 18) + 9), y2 = Math.floor(hash(seed + 12.3) * (h - 18) + 9);
  const svg =
    `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">` +
    `<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">` +
    `<stop offset="0%" stop-color="hsl(${h1} 85% 60%)"/>` +
    `<stop offset="55%" stop-color="hsl(${h2} 80% 55%)"/>` +
    `<stop offset="100%" stop-color="hsl(${h3} 75% 48%)"/>` +
    `</linearGradient></defs>` +
    `<rect width="${w}" height="${h}" fill="url(#g)"/>` +
    `<circle cx="${x1}" cy="${y1}" r="${Math.round(h * 0.22)}" fill="rgba(255,255,255,${a})"/>` +
    `<circle cx="${x2}" cy="${y2}" r="${Math.round(h * 0.16)}" fill="rgba(255,255,255,${a2})"/>` +
    `<path d="M0 ${Math.round(h * 0.78)} C${Math.round(w * 0.2)} ${Math.round(h * (0.58 + hash(seed + 13) * 0.15))}, ${Math.round(w * 0.68)} ${Math.round(h * (0.88 - hash(seed + 14) * 0.15))}, ${w} ${Math.round(h * 0.62)} L${w} ${h} L0 ${h}Z" fill="rgba(0,0,0,0.18)"/>` +
    `</svg>`;
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

function makeGalleryPool(count) {
  return Array.from({ length: count }, (_, i) => {
    const img = new Image();
    const aspect = 1;
    return { img, aspect };
  });
}

const galleryPool = makeGalleryPool(N);
function rebuildViewerItemsFromPool() {
  const seen = new Set();
  const list = [];
  for (const media of galleryPool) {
    const src = media.img && media.img.src ? media.img.src : "";
    if (!src || seen.has(src)) continue;
    seen.add(src);
    list.push(media);
  }
  if (list.length > 0) viewerItems = list;
}

function getOrderedGridItems() {
  if (!morphGridSrcOrder || !morphGridSrcOrder.length) return viewerItems;
  const bySrc = new Map(viewerItems.map(m => [m.img.src, m]));
  const ordered = morphGridSrcOrder.map(src => bySrc.get(src)).filter(Boolean);
  return ordered.length ? ordered : viewerItems;
}

function buildMasonryLayout(count, getAspect, scrollY = 0, ids = null) {
  const cols = GRID_COLS;
  const gap = GRID_GAP;
  const width = Math.max(120, W - 40);
  const colW = (width - gap * (cols - 1)) / cols;
  const colHeights = Array.from({ length: cols }, () => 0);
  const rects = [];

  for (let i = 0; i < count; i++) {
    const aspect = Math.max(0.2, getAspect(i));
    const h = colW / aspect;
    let col = 0;
    for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[col]) col = c;
    const left = col * (colW + gap);
    const top = colHeights[col];
    colHeights[col] += h + gap;
    const rect = { x: 20 + left, y: 74 + top - scrollY, w: colW, h };
    if (ids && ids[i] != null) rect.id = ids[i];
    rects.push(rect);
  }
  return { rects, contentHeight: Math.max(...colHeights, 0) - gap };
}

function renderGridMode() {
  gridWrap.innerHTML = "";
  const items = getOrderedGridItems();
  const { rects, contentHeight } = buildMasonryLayout(
    items.length,
    i => items[i].aspect,
    0
  );
  gridWrap.style.height = `${Math.max(0, contentHeight)}px`;
  items.forEach((media, i) => {
    const r = rects[i];
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "grid-item";
    btn.style.left = `${r.x - 20}px`;
    btn.style.top = `${r.y - 74}px`;
    btn.style.width = `${r.w}px`;
    btn.style.height = `${r.h}px`;
    const img = document.createElement("img");
    img.src = media.img.src;
    img.alt = "";
    btn.appendChild(img);
    btn.addEventListener("click", () => {
      const r = img.getBoundingClientRect();
      const box = {
        x: r.left, y: r.top, w: r.width, h: r.height,
        tl: { x: r.left, y: r.top },
        tr: { x: r.right, y: r.top },
        bl: { x: r.left, y: r.bottom },
        srcW: media.img.naturalWidth || 120,
        srcH: media.img.naturalHeight || 120
      };
      openViewerByMedia(media, box);
    });
    gridWrap.appendChild(btn);
  });
}

function setSphereLayoutMode() {
  canvas.style.opacity = "1";
  canvas.style.pointerEvents = "auto";
  gridMode.classList.remove("open");
  document.body.style.overflow = "hidden";
  window.scrollTo(0, 0);
  modeToggle.classList.remove("grid");
  modeToggle.setAttribute("aria-label", "Switch to grid view");
}

function setGridLayoutMode() {
  renderGridMode();
  gridMode.classList.add("open");
  canvas.style.opacity = "0";
  canvas.style.pointerEvents = "none";
  document.body.style.overflow = "auto";
  window.scrollTo(0, 0);
  modeToggle.classList.add("grid");
  modeToggle.setAttribute("aria-label", "Switch to sphere view");
}

function startModeTransition(target) {
  if (viewerOpen || viewerAnimating) return;
  if (target === "grid" && viewMode === "grid") return;
  if (target === "sphere" && viewMode === "sphere") return;

  modeMorphFrom = modeMorph;
  modeMorphTo = target === "grid" ? 1 : 0;
  modeMorphStartMs = performance.now();
  modeMorphScrollY = target === "sphere" ? window.scrollY : 0;
  modeToggle.classList.toggle("grid", target === "grid");
  if (target === "grid") {
    morphOrderIds = null;
    morphGridSrcOrder = null;
    pendingGridOrderBuild = true;
  }
  if (target === "sphere" && gridOrderIds.length) morphOrderIds = [...gridOrderIds];

  if (target === "sphere") {
    gridMode.classList.remove("open");
    document.body.style.overflow = "hidden";
    canvas.style.opacity = "1";
    canvas.style.pointerEvents = "auto";
  } else {
    canvas.style.opacity = "1";
    canvas.style.pointerEvents = "none";
    document.body.style.overflow = "hidden";
    window.scrollTo(0, 0);
  }
}

function renderViewerStrip() {
  viewerStrip.innerHTML = "";
  viewerItems.forEach((media, i) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "viewer-thumb" + (i === viewerIndex ? " active" : "");
    const img = document.createElement("img");
    img.src = media.img.src;
    img.alt = "";
    btn.appendChild(img);
    btn.addEventListener("click", () => setViewerIndex(i));
    viewerStrip.appendChild(btn);
  });
}

function updateViewerSideImages() {
  if (!viewerItems.length) return;
  if (viewerItems.length < 2) {
    viewerSideLeftImg.style.opacity = "0";
    viewerSideRightImg.style.opacity = "0";
    return;
  }
  const n = viewerItems.length;
  const prev = viewerItems[(viewerIndex - 1 + n) % n];
  const next = viewerItems[(viewerIndex + 1) % n];
  viewerSideLeftImg.src = prev.img.src;
  viewerSideRightImg.src = next.img.src;
  viewerSideLeftImg.style.opacity = "";
  viewerSideRightImg.style.opacity = "";
}

function setViewerIndex(i, opts = {}) {
  if (!viewerItems.length) return;
  const n = viewerItems.length;
  const nextIndex = ((i % n) + n) % n;
  const prevIndex = viewerIndex;
  const animate = opts.animate !== false && viewerOpen;
  const direction = opts.direction || (nextIndex === prevIndex ? 0 : (nextIndex > prevIndex ? 1 : -1));
  const commit = () => {
    viewerIndex = nextIndex;
    const media = viewerItems[viewerIndex];
    viewerMain.src = media.img.src;
    updateViewerSideImages();
    const thumbs = viewerStrip.querySelectorAll(".viewer-thumb");
    thumbs.forEach((el, idx) => el.classList.toggle("active", idx === viewerIndex));
    const active = thumbs[viewerIndex];
    if (active) active.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" });
  };

  if (!animate || direction === 0) {
    if (viewerSwitchTimer) {
      clearTimeout(viewerSwitchTimer);
      viewerSwitchTimer = null;
    }
    viewerEl.classList.remove("switch-next", "switch-prev");
    commit();
    return;
  }

  if (viewerSwitchTimer) clearTimeout(viewerSwitchTimer);
  viewerEl.classList.remove("switch-next", "switch-prev");
  viewerEl.classList.add(direction > 0 ? "switch-next" : "switch-prev");
  viewerSwitchTimer = setTimeout(() => {
    commit();
    requestAnimationFrame(() => {
      viewerEl.classList.remove("switch-next", "switch-prev");
    });
    viewerSwitchTimer = null;
  }, 170);
}

function getMediaAspect(media) {
  if (!media || !media.img) return 1;
  const w = media.img.naturalWidth || 1;
  const h = media.img.naturalHeight || 1;
  return w / h;
}

function getViewerTargetRect(media) {
  const vw = innerWidth;
  const vh = innerHeight;
  const pad = clamp(vh * 0.14, 118, 156);
  const targetH = Math.max(32, vh - pad * 2);
  const aspect = getMediaAspect(media);
  const maxW = vw * 0.96;
  const wByHeight = targetH * aspect;
  const w = Math.min(maxW, wByHeight);
  const h = w / aspect;
  const x = (vw - w) * 0.5;
  const y = (vh - h) * 0.5;
  return { x, y, w, h };
}


function waitForViewerMain(src) {
  return new Promise(resolve => {
    if (viewerMain.src !== src) viewerMain.src = src;
    if (viewerMain.complete) {
      resolve();
      return;
    }
    const done = () => {
      viewerMain.removeEventListener("load", done);
      viewerMain.removeEventListener("error", done);
      resolve();
    };
    viewerMain.addEventListener("load", done, { once: true });
    viewerMain.addEventListener("error", done, { once: true });
  });
}

function matrixForQuad(quad, srcW, srcH) {
  const a = (quad.tr.x - quad.tl.x) / srcW;
  const b = (quad.tr.y - quad.tl.y) / srcW;
  const c = (quad.bl.x - quad.tl.x) / srcH;
  const d = (quad.bl.y - quad.tl.y) / srcH;
  const tx = quad.tl.x;
  const ty = quad.tl.y;
  return `matrix(${a}, ${b}, ${c}, ${d}, ${tx}, ${ty})`;
}

function animateViewerOpen(media, sourceBox) {
  return new Promise(resolve => {
    if (!sourceBox || !sourceBox.tl || !sourceBox.tr || !sourceBox.bl) {
      resolve();
      return;
    }
    const to = getViewerTargetRect(media);
    const srcW = sourceBox.srcW || (media.img.naturalWidth || 120);
    const srcH = sourceBox.srcH || (media.img.naturalHeight || 120);
    const fromQuad = { tl: sourceBox.tl, tr: sourceBox.tr, bl: sourceBox.bl };
    const toQuad = {
      tl: { x: to.x, y: to.y },
      tr: { x: to.x + to.w, y: to.y },
      bl: { x: to.x, y: to.y + to.h }
    };
    viewerTransit.src = media.img.src;
    viewerTransit.style.display = "block";
    viewerTransit.style.transition = "none";
    viewerTransit.style.left = "0px";
    viewerTransit.style.top = "0px";
    viewerTransit.style.width = `${srcW}px`;
    viewerTransit.style.height = `${srcH}px`;
    viewerTransit.style.transform = matrixForQuad(fromQuad, srcW, srcH);
    viewerTransit.style.opacity = "1";

    requestAnimationFrame(() => {
      viewerTransit.style.transition = "transform 360ms ease, opacity 180ms ease";
      viewerTransit.style.transform = matrixForQuad(toQuad, srcW, srcH);
      viewerTransit.style.opacity = "1";
      setTimeout(() => {
        resolve();
      }, 370);
    });
  });
}

async function openViewerByMedia(media, sourceBox) {
  if (viewerAnimating) return;
  if (!viewerItems.length) rebuildViewerItemsFromPool();
  if (!viewerItems.length) return;
  const src = media && media.img ? media.img.src : "";
  const idx = Math.max(0, viewerItems.findIndex(it => it.img.src === src));
  viewerAnimating = true;
  viewerOpen = true;
  viewerEl.classList.add("open");
  viewerMain.style.opacity = "0";
  viewerStrip.style.opacity = "0";
  viewerSideLeftImg.style.opacity = "0";
  viewerSideRightImg.style.opacity = "0";
  renderViewerStrip();
  setViewerIndex(idx, { animate: false });
  const mainReady = waitForViewerMain(viewerItems[idx].img.src);
  await Promise.all([animateViewerOpen(media, sourceBox), mainReady]);
  viewerMain.style.opacity = "1";
  viewerStrip.style.opacity = "1";
  viewerSideLeftImg.style.opacity = "";
  viewerSideRightImg.style.opacity = "";
  requestAnimationFrame(() => {
    viewerTransit.style.transition = "opacity 140ms ease";
    viewerTransit.style.opacity = "0";
    setTimeout(() => {
      viewerTransit.style.display = "none";
      viewerTransit.style.opacity = "1";
    }, 150);
  });
  viewerAnimating = false;
}

function closeViewer() {

viewerClose.addEventListener("click", closeViewer);
viewerNavLeft.addEventListener("click", () => setViewerIndex(viewerIndex - 1, { direction: -1 }));
viewerNavRight.addEventListener("click", () => setViewerIndex(viewerIndex + 1, { direction: 1 }));

async function loadCustomImagesIntoPool(pool) {
  try {
    const res = await fetch(IMAGE_MANIFEST_URL, { cache: "no-store" });
    if (!res.ok) return;
    const raw = await res.json();
    if (!Array.isArray(raw) || raw.length === 0) return;

    const files = raw
      .map(item => (typeof item === "string" ? { src: item } : item))
      .filter(item => item && typeof item.src === "string" && item.src.trim().length > 0);
    if (files.length === 0) return;

    const customViewerItems = files.map(file => {
      const img = new Image();
      const media = { img, aspect: 1 };
      img.src = file.src;
      img.onload = () => {
        const w = img.naturalWidth || 1;
        const h = img.naturalHeight || 1;
        media.aspect = w / h;
      };
      return media;
    });

    for (let i = 0; i < pool.length; i++) {
      const src = files[i % files.length].src;
      const entry = pool[i];
      const img = new Image();
      img.src = src;
      img.onload = () => {
        const w = img.naturalWidth || 1;
        const h = img.naturalHeight || 1;
        entry.aspect = w / h;
      };
      entry.img = img;
    }
    if (customViewerItems.length > 0) viewerItems = customViewerItems;
    if (viewMode === "grid") renderGridMode();
  } catch (_) {
    // Keep placeholders if manifest is missing or malformed.
  }
}
loadCustomImagesIntoPool(galleryPool);
rebuildViewerItemsFromPool();
setSphereLayoutMode();

class Dot {
  constructor(i) {
    const { phi, theta } = placeOnSphere(i);
    this.id = i;
    this.phi = phi; this.theta = theta;
    this.ux = Math.sin(phi)*Math.cos(theta); this.uy = Math.cos(phi); this.uz = Math.sin(phi)*Math.sin(theta);
    const sz = Math.pow(hash(i * 7.13 + 0.5), 2.2);
    this.baseSize = 36 + sz * 36.0;
    this.spawnT = hash(i * 4.1 + 1.7); this.opacity = 0; this.alive = false;
    this.fadeSpeed = 0.006 + hash(i * 9.1) * 0.022;
    this.driftSeed = hash(i * 11.3) * 100; this.driftSpeed = 0.00028 + hash(i * 2.9) * 0.0007;
    this.driftAmp = 0.012 + hash(i * 6.1) * 0.035;
    this.driftSeed2 = hash(i * 17.9) * 100; this.driftSpeed2 = 0.00018 + hash(i * 13.1) * 0.00055;
    this.pulsePhase = hash(i * 8.7) * Math.PI * 2;
    this.pulseSpeed = 0.003 + hash(i * 3.3) * 0.008;
    this.pulseAmt = 0.01 + hash(i * 5.5) * 0.035;
    this.hoverScale = 1.0;
    this.hoverPop = 0.0;
    this.media = galleryPool[i % galleryPool.length];
  }
  driftedUxyz(t) {
    const dp = Math.sin(this.driftSeed + t*this.driftSpeed*1.3)*this.driftAmp + Math.sin(this.driftSeed2 + t*this.driftSpeed2*0.7)*this.driftAmp*0.45;
    const dt = Math.cos(this.driftSeed*1.7 + t*this.driftSpeed)*this.driftAmp*0.8 + Math.cos(this.driftSeed2*2.3 + t*this.driftSpeed2*1.1)*this.driftAmp*0.35;
    const phi = this.phi + dp, theta = this.theta + dt;
    return { ux: Math.sin(phi)*Math.cos(theta), uy: Math.cos(phi), uz: Math.sin(phi)*Math.sin(theta) };
  }
  project(ry, rx, Rv, cx, cy, t) {
    const { ux, uy, uz } = this.driftedUxyz(t);
    const n = { x: ux, y: uy, z: uz };
    const ref = Math.abs(n.y) > 0.92 ? { x: 1, y: 0, z: 0 } : { x: 0, y: 1, z: 0 };
    const t1 = normalize3(cross3(ref, n));
    const t2 = normalize3(cross3(n, t1));
    const p = rotate3(n, ry, rx);
    const a1 = rotate3(t1, ry, rx);
    const a2 = rotate3(t2, ry, rx);
    return {
      px: cx + p.x * Rv,
      py: cy + p.y * Rv,
      fz: p.z,
      nx: p.x,
      ny: p.y,
      nz: p.z,
      u3x: a1.x,
      u3y: a1.y,
      u3z: a1.z,
      v3x: a2.x,
      v3y: a2.y,
      v3z: a2.z,
      axx: a1.x,
      axy: a1.y,
      bxx: a2.x,
      bxy: a2.y
    };
  }
}

const dots = Array.from({length: N}, (_, i) => new Dot(i));

let globalT=0, spawnClock=0;
const SPAWN_DURATION=520;
let rotY=0, rotX=0.28;
let phase='spawn';

// Inertia velocities for free spin after drag
let inertiaX = 0, inertiaY = 0;

function cross3(a, b) {
  return { x: a.y * b.z - a.z * b.y, y: a.z * b.x - a.x * b.z, z: a.x * b.y - a.y * b.x };
}

function normalize3(v) {
  const m = Math.hypot(v.x, v.y, v.z) || 1;
  return { x: v.x / m, y: v.y / m, z: v.z / m };
}

function rotate3(v, ry, rx) {
  const cosY = Math.cos(ry), sinY = Math.sin(ry);
  const x1 = v.x * cosY + v.z * sinY;
  const y1 = v.y;
  const z1 = -v.x * sinY + v.z * cosY;
  const cosX = Math.cos(rx), sinX = Math.sin(rx);
  return {
    x: x1,
    y: y1 * cosX - z1 * sinX,
    z: y1 * sinX + z1 * cosX
  };
}

function pickTopItem(x, y) {
  for (let i = renderedItems.length - 1; i >= 0; i--) {
    const item = renderedItems[i];
    if (x >= item.x && x <= item.x + item.w && y >= item.y && y <= item.y + item.h) return item;
  }
  return null;
}

function buildMorphGridRectById(drawQueue, scrollY) {
  if (!drawQueue.length) return new Map();
  if (!morphOrderIds || morphOrderIds.length !== drawQueue.length) {
    const sorted = [...drawQueue].sort((a, b) => b.fz - a.fz);
    morphOrderIds = sorted.map(it => it.d.id);
  }
  const byId = new Map(drawQueue.map(it => [it.d.id, it]));
  const ordered = morphOrderIds
    .map(id => byId.get(id))
    .filter(Boolean);
  const ids = ordered.map(it => it.d.id);
  const { rects } = buildMasonryLayout(
    ordered.length,
    i => (ordered[i].srcW || 120) / Math.max(1, ordered[i].srcH || 120),
    scrollY,
    ids
  );
  const rectById = new Map();
  rects.forEach(r => rectById.set(r.id, r));
  return rectById;
}

function buildMorphOrderFromFront(drawQueue) {
  const bestBySrc = new Map();
  for (const it of drawQueue) {
    const src = it.d.media.img && it.d.media.img.src ? it.d.media.img.src : "";
    if (!src) continue;
    const prev = bestBySrc.get(src);
    if (!prev || it.fz > prev.fz) bestBySrc.set(src, it);
  }
  const anchors = [...bestBySrc.values()].sort((a, b) => b.fz - a.fz);
  morphOrderIds = anchors.map(it => it.d.id);
  morphGridSrcOrder = anchors.map(it => it.d.media.img.src);
}

function applyViewportEdgeBlur(cx, cy, Rv) {
  const bw = edgeBlurCanvas.width;
  const bh = edgeBlurCanvas.height;
  if (!bw || !bh) return;

  // Build a single blurred version of the whole frame at reduced resolution.
  edgeBlurCtx.clearRect(0, 0, bw, bh);
  edgeBlurCtx.filter = `blur(${EDGE_BLUR_PX}px)`;
  edgeBlurCtx.drawImage(canvas, 0, 0, bw, bh);
  edgeBlurCtx.filter = "none";

  // Create radial mask: blur near edge, minimal blur in the center.
  const inner = Rv * 0.46;
  const outer = Rv * 0.96;
  const g = edgeMaskCtx.createRadialGradient(cx, cy, inner, cx, cy, outer);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(0.36, "rgba(0,0,0,0.18)");
  g.addColorStop(0.68, "rgba(0,0,0,0.56)");
  g.addColorStop(1, "rgba(0,0,0,1)");

  // Build masked blurred layer.
  edgeMaskCtx.clearRect(0, 0, W, H);
  edgeMaskCtx.drawImage(edgeBlurCanvas, 0, 0, W, H);
  edgeMaskCtx.globalCompositeOperation = "destination-in";
  edgeMaskCtx.fillStyle = g;
  edgeMaskCtx.fillRect(0, 0, W, H);
  edgeMaskCtx.globalCompositeOperation = "source-over";

  // Remove sharp pixels on the same edge mask, then draw blurred replacement.
  ctx.save();
  ctx.globalCompositeOperation = "destination-out";
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 1;
  ctx.drawImage(edgeMaskCanvas, 0, 0);
  ctx.restore();
}

function animate() {
  globalT++;
  if (modeMorph !== modeMorphTo) {
    const t = Math.min(1, (performance.now() - modeMorphStartMs) / modeMorphDurationMs);
    const eased = 1 - Math.pow(1 - t, 3);
    modeMorph = modeMorphFrom + (modeMorphTo - modeMorphFrom) * eased;
    if (t >= 1) {
      modeMorph = modeMorphTo;
      viewMode = modeMorphTo >= 0.5 ? "grid" : "sphere";
      if (viewMode === "grid") {
        if (morphOrderIds && morphOrderIds.length) gridOrderIds = [...morphOrderIds];
        setGridLayoutMode();
      }
      else setSphereLayoutMode();
    }
  }

  if (viewerOpen) {
    requestAnimationFrame(animate);
    return;
  }
  if (viewMode === "grid" && modeMorph >= 1) {
    requestAnimationFrame(animate);
    return;
  }
  ctx.clearRect(0, 0, W, H);
  zoom += (targetZoom - zoom) * 0.14;
  const cx=W/2, cy=H/2;
  const Rv=breathRadius() * zoom;

  if (phase==='spawn') {
    spawnClock=Math.min(1, globalT/SPAWN_DURATION);
    for(const d of dots){if(!d.alive&&d.spawnT<=spawnClock)d.alive=true; if(d.alive)d.opacity=Math.min(1,d.opacity+d.fadeSpeed);}
    if(spawnClock>=1&&dots.every(d=>d.opacity>=0.95))phase='rotate';
  }

  if (drag.active) {
    // While dragging: freeze auto-rotation, zero inertia accumulation
    inertiaX = drag.velY * 0.005;
    inertiaY = drag.velX * 0.005;
  } else {
    // Apply inertia and decay
    rotX -= inertiaX;
    rotY += inertiaY;
    inertiaX *= 0.92;
    inertiaY *= 0.92;

    // Auto-rotation: always one direction, including spawn phase.
    const inertiaStrength = Math.abs(inertiaX) + Math.abs(inertiaY);
    if (inertiaStrength < 0.0005) {
      rotY += AUTO_ROT_SPEED;
    }

    if(phase==='rotate'){
      for(const d of dots){d.alive=true; d.opacity=Math.min(1,d.opacity+d.fadeSpeed);}
    }
  }

  rotX=Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));

  const all=[];
  for(const d of dots){
    if(!d.alive||d.opacity<=0)continue;
    const p=d.project(rotY,rotX,Rv,cx,cy,globalT);
    all.push({d,...p});
  }
  all.sort((a,b)=>a.fz-b.fz);
  renderedItems = [];
  const drawQueue = [];

  for(let itemIndex = 0; itemIndex < all.length; itemIndex++){
    const item = all[itemIndex];
    const {d,px,py,fz,axx,axy,bxx,bxy}=item;
    if (!d.media.img.complete || !d.media.img.naturalWidth || !d.media.img.naturalHeight) continue;
    const depth=(fz+1)/2;
    const depthSz=0.35+depth*0.95;
    const depthAlp=0.15+depth*0.9;

    d.pulsePhase+=d.pulseSpeed;
    const pulse=1+Math.sin(d.pulsePhase)*d.pulseAmt;

    const dx=px-mouse.x, dy=py-mouse.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const targetHover=dist<HOVER_RADIUS?SCALE_MAX:1.0;
    d.hoverScale+=(targetHover-d.hoverScale)*SCALE_SPEED;

    const imgAspect = (d.media.img.naturalWidth && d.media.img.naturalHeight)
      ? d.media.img.naturalWidth / d.media.img.naturalHeight
      : d.media.aspect;
    const hPx=Math.max(26,d.baseSize*depthSz*pulse*d.hoverScale*zoom);
    const wPx=hPx*imgAspect;
    const a=d.opacity*depthAlp;
    if(a<0.008)continue;

    const front = 0.12 + depth * 0.88;
    const ux = { x: axx * (wPx * 0.5), y: axy * (wPx * 0.5) };
    const vy = { x: bxx * (hPx * 0.5), y: bxy * (hPx * 0.5) };
    const srcW = d.media.img.naturalWidth || 120;
    const srcH = d.media.img.naturalHeight || 120;
    const minAxis = 1.5;
    if (Math.hypot(ux.x, ux.y) < minAxis) {
      const m = Math.hypot(ux.x, ux.y) || 1;
      ux.x = (ux.x / m) * minAxis;
      ux.y = (ux.y / m) * minAxis;
    }
    if (Math.hypot(vy.x, vy.y) < minAxis) {
      const m = Math.hypot(vy.x, vy.y) || 1;
      vy.x = (vy.x / m) * minAxis;
      vy.y = (vy.y / m) * minAxis;
    }

    const tl = { x: px - ux.x - vy.x, y: py - ux.y - vy.y };
    const tr = { x: px + ux.x - vy.x, y: py + ux.y - vy.y };
    const bl = { x: px - ux.x + vy.x, y: py - ux.y + vy.y };
    const br = { x: px + ux.x + vy.x, y: py + ux.y + vy.y };

    const minX = Math.min(tl.x, tr.x, bl.x, br.x);
    const maxX = Math.max(tl.x, tr.x, bl.x, br.x);
    const minY = Math.min(tl.y, tr.y, bl.y, br.y);
    const maxY = Math.max(tl.y, tr.y, bl.y, br.y);
    drawQueue.push({ d, px, py, fz, front, srcW, srcH, a, tl, tr, bl, br, minX, minY, maxX, maxY, depth, itemIndex });
  }

  let hoveredDrawIdx = -1;
  for (let i = drawQueue.length - 1; i >= 0; i--) {
    const it = drawQueue[i];
    if (mouse.x >= it.minX && mouse.x <= it.maxX && mouse.y >= it.minY && mouse.y <= it.maxY) {
      hoveredDrawIdx = i;
      break;
    }
  }

  for (let i = 0; i < drawQueue.length; i++) {
    const it = drawQueue[i];
    const targetPop = (i === hoveredDrawIdx) ? 1 : 0;
    it.d.hoverPop += (targetPop - it.d.hoverPop) * 0.18;
  }

  if (pendingGridOrderBuild && drawQueue.length) {
    buildMorphOrderFromFront(drawQueue);
    pendingGridOrderBuild = false;
  }

  const morphRectById = modeMorph > 0.001
    ? buildMorphGridRectById(drawQueue, modeMorphScrollY)
    : null;

  const drawCard = (it, popT) => {
    let tl = it.tl, tr = it.tr, bl = it.bl, br = it.br;
    let morphAlpha = 1;
    if (popT > 0.001) {
      const dm = Math.hypot(it.px - cx, it.py - cy) || 1;
      const lift = HOVER_LIFT_PX * popT;
      const sx = 1 + (HOVER_POP_SCALE - 1) * popT;
      const lx = ((it.px - cx) / dm) * lift;
      const ly = ((it.py - cy) / dm) * lift;
      const remap = p => ({ x: it.px + (p.x - it.px) * sx + lx, y: it.py + (p.y - it.py) * sx + ly });
      tl = remap(tl); tr = remap(tr); bl = remap(bl); br = remap(br);
    }

    if (modeMorph > 0.001 && morphRectById) {
      const gr = morphRectById.get(it.d.id);
      if (gr) {
      const gtl = { x: gr.x, y: gr.y };
      const gtr = { x: gr.x + gr.w, y: gr.y };
      const gbl = { x: gr.x, y: gr.y + gr.h };
      const gbr = { x: gr.x + gr.w, y: gr.y + gr.h };
      const srcCx = (tl.x + tr.x + bl.x + br.x) * 0.25;
      const srcCy = (tl.y + tr.y + bl.y + br.y) * 0.25;
      const dstCx = gr.x + gr.w * 0.5;
      const dstCy = gr.y + gr.h * 0.5;
      const dist = Math.hypot(srcCx - dstCx, srcCy - dstCy);
      const proximity = 1 - Math.min(1, dist / (Math.hypot(W, H) * 0.85));
      morphAlpha = 0.22 + 0.78 * (0.55 * proximity + 0.45 * modeMorph);
      const lerp = (a, b) => a + (b - a) * modeMorph;
      tl = { x: lerp(tl.x, gtl.x), y: lerp(tl.y, gtl.y) };
      tr = { x: lerp(tr.x, gtr.x), y: lerp(tr.y, gtr.y) };
      bl = { x: lerp(bl.x, gbl.x), y: lerp(bl.y, gbl.y) };
      br = { x: lerp(br.x, gbr.x), y: lerp(br.y, gbr.y) };
      } else {
      morphAlpha = Math.max(0, 1 - modeMorph * 1.45);
      }
    }

    ctx.save();
    ctx.globalAlpha = Math.min(1, it.a * (0.75 + it.front * 0.25) * (1 + 0.08 * popT) * morphAlpha);
    ctx.setTransform(
      (tr.x - tl.x) / it.srcW,
      (tr.y - tl.y) / it.srcW,
      (bl.x - tl.x) / it.srcH,
      (bl.y - tl.y) / it.srcH,
      tl.x,
      tl.y
    );
    ctx.drawImage(it.d.media.img, 0, 0);
    ctx.restore();

    const minX = Math.min(tl.x, tr.x, bl.x, br.x);
    const maxX = Math.max(tl.x, tr.x, bl.x, br.x);
    const minY = Math.min(tl.y, tr.y, bl.y, br.y);
    const maxY = Math.max(tl.y, tr.y, bl.y, br.y);
    renderedItems.push({
      d: it.d,
      x: minX,
      y: minY,
      w: maxX - minX,
      h: maxY - minY,
      depth: it.depth,
      fz: it.fz,
      tl,
      tr,
      bl,
      srcW: it.srcW,
      srcH: it.srcH
    });
  };

  for (let i = 0; i < drawQueue.length; i++) {
    if (i === hoveredDrawIdx) continue;
    drawCard(drawQueue[i], drawQueue[i].d.hoverPop);
  }
  if (hoveredDrawIdx >= 0) drawCard(drawQueue[hoveredDrawIdx], drawQueue[hoveredDrawIdx].d.hoverPop);

  if (modeMorph < 0.95) applyViewportEdgeBlur(cx, cy, Rv);

  hoverItem = pickTopItem(mouse.x, mouse.y);
  if (hoverItem && !drag.active) canvas.style.cursor = "pointer";
  else if (!drag.active) canvas.style.cursor = "grab";

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
