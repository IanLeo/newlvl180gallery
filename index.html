<!DOCTYPE html>
<html>
<head>
<style>* { margin: 0; padding: 0; } body { background: #000; overflow: hidden; } canvas { display: block; cursor: grab; } canvas.dragging { cursor: grabbing; }</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const N = 3200, N_INNER = 1400, FPS = 60;
const BREATH_IN = 5.0 * FPS, BREATH_OUT = 5.0 * FPS;
const HOVER_RADIUS = 60, SCALE_MAX = 3.0, SCALE_SPEED = 0.12;

// Mouse state
let mouse = { x: -9999, y: -9999 };
let drag = { active: false, lastX: 0, lastY: 0, velX: 0, velY: 0 };

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (drag.active) {
    drag.velX = e.clientX - drag.lastX;
    drag.velY = e.clientY - drag.lastY;
    rotY += drag.velX * 0.005;
    rotX -= drag.velY * 0.005;
    rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    drag.lastX = e.clientX; drag.lastY = e.clientY;
  }
});
canvas.addEventListener('mousedown', e => {
  drag.active = true; drag.lastX = e.clientX; drag.lastY = e.clientY;
  drag.velX = 0; drag.velY = 0;
  canvas.classList.add('dragging');
});
canvas.addEventListener('mouseup', () => { drag.active = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; drag.active = false; canvas.classList.remove('dragging'); });

// Touch support
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  drag.active = true; drag.lastX = t.clientX; drag.lastY = t.clientY;
  drag.velX = 0; drag.velY = 0;
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  drag.velX = t.clientX - drag.lastX; drag.velY = t.clientY - drag.lastY;
  rotY += drag.velX * 0.005; rotX -= drag.velY * 0.005;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  drag.lastX = t.clientX; drag.lastY = t.clientY;
}, { passive: true });
canvas.addEventListener('touchend', () => { drag.active = false; });

function hash(n) { return ((Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1 + 1) % 1; }

function breathRadius(t) {
  const base = Math.min(W, H) * 0.36;
  const cycle = BREATH_IN + BREATH_OUT;
  const p = (t % cycle) / cycle;
  const breath = p < 0.5 ? (1 - Math.cos(p * 2 * Math.PI)) / 2 : (1 + Math.cos((p - 0.5) * 2 * Math.PI)) / 2;
  return base * (0.92 + breath * 0.16);
}

function placeOnSphere(i) {
  const u = hash(i * 3.7 + 1.1), v = hash(i * 5.3 + 2.9);
  const warp1 = Math.sin(u * 11.3 + v * 7.1) * 0.09, warp2 = Math.cos(v * 9.7 + u * 5.3) * 0.09;
  const phi = Math.acos(Math.max(-1, Math.min(1, 1 - 2 * ((u + warp1 + 1) % 1))));
  const theta = ((v + warp2 + 1) % 1) * Math.PI * 2;
  return { phi, theta };
}

class Dot {
  constructor(i) {
    const { phi, theta } = placeOnSphere(i);
    this.phi = phi; this.theta = theta;
    this.ux = Math.sin(phi)*Math.cos(theta); this.uy = Math.cos(phi); this.uz = Math.sin(phi)*Math.sin(theta);
    const sz = Math.pow(hash(i * 7.13 + 0.5), 2.2);
    this.baseSize = 0.6 + sz * 6.0;
    this.spawnT = hash(i * 4.1 + 1.7); this.opacity = 0; this.alive = false;
    this.fadeSpeed = 0.006 + hash(i * 9.1) * 0.022;
    this.driftSeed = hash(i * 11.3) * 100; this.driftSpeed = 0.0008 + hash(i * 2.9) * 0.002;
    this.driftAmp = 0.04 + hash(i * 6.1) * 0.10;
    this.driftSeed2 = hash(i * 17.9) * 100; this.driftSpeed2 = 0.0005 + hash(i * 13.1) * 0.0015;
    this.pulsePhase = hash(i * 8.7) * Math.PI * 2;
    this.pulseSpeed = 0.007 + hash(i * 3.3) * 0.018;
    this.pulseAmt = 0.04 + hash(i * 5.5) * 0.28;
    this.hoverScale = 1.0;
  }
  driftedUxyz(t) {
    const dp = Math.sin(this.driftSeed + t*this.driftSpeed*1.3)*this.driftAmp + Math.sin(this.driftSeed2 + t*this.driftSpeed2*0.7)*this.driftAmp*0.45;
    const dt = Math.cos(this.driftSeed*1.7 + t*this.driftSpeed)*this.driftAmp*0.8 + Math.cos(this.driftSeed2*2.3 + t*this.driftSpeed2*1.1)*this.driftAmp*0.35;
    const phi = this.phi + dp, theta = this.theta + dt;
    return { ux: Math.sin(phi)*Math.cos(theta), uy: Math.cos(phi), uz: Math.sin(phi)*Math.sin(theta) };
  }
  project(ry, rx, Rv, cx, cy, t) {
    const { ux, uy, uz } = this.driftedUxyz(t);
    const cosY=Math.cos(ry), sinY=Math.sin(ry);
    const x1=ux*cosY+uz*sinY, y1=uy, z1=-ux*sinY+uz*cosY;
    const cosX=Math.cos(rx), sinX=Math.sin(rx);
    return { px: cx+x1*Rv, py: cy+(y1*cosX-z1*sinX)*Rv, fz: y1*sinX+z1*cosX };
  }
}

class InnerDot {
  constructor(i) {
    const seed = i * 31.7 + 7.3;
    const r = Math.pow(hash(seed), 0.6);
    const phi = Math.acos(1 - 2*hash(seed+1)), theta = hash(seed+2)*Math.PI*2;
    this.ur = r;
    this.ux = r*Math.sin(phi)*Math.cos(theta); this.uy = r*Math.cos(phi); this.uz = r*Math.sin(phi)*Math.sin(theta);
    this.baseSize = 0.4 + hash(seed+3)*2.2; this.opacity = 0; this.alive = false;
    this.spawnT = hash(seed+4); this.fadeSpeed = 0.004 + hash(seed+5)*0.012;
    this.vx=(hash(seed+6)-.5)*.0006; this.vy=(hash(seed+7)-.5)*.0006; this.vz=(hash(seed+8)-.5)*.0006;
    this.wx=(hash(seed+9)-.5)*.00012; this.wy=(hash(seed+10)-.5)*.00012; this.wz=(hash(seed+11)-.5)*.00012;
    this.pulsePhase=hash(seed+12)*Math.PI*2; this.pulseSpeed=0.012+hash(seed+13)*0.025;
    this.pulseAmt=0.1+hash(seed+14)*0.5; this.hoverScale=1.0;
  }
  update(t) {
    this.vx+=this.wx; this.vy+=this.wy; this.vz+=this.wz;
    const spd=Math.sqrt(this.vx*this.vx+this.vy*this.vy+this.vz*this.vz), maxSpd=0.0012;
    if(spd>maxSpd){this.vx*=maxSpd/spd; this.vy*=maxSpd/spd; this.vz*=maxSpd/spd;}
    const d=Math.sqrt(this.ux*this.ux+this.uy*this.uy+this.uz*this.uz), maxR=1.12;
    if(d>maxR){const pull=(d-maxR)*0.002; this.vx-=(this.ux/d)*pull; this.vy-=(this.uy/d)*pull; this.vz-=(this.uz/d)*pull;}
    this.ux+=this.vx; this.uy+=this.vy; this.uz+=this.vz;
    this.wx+=(hash((t+this.pulsePhase)*0.003)-.5)*0.00003;
    this.wy+=(hash((t+this.pulsePhase)*0.0031+1)-.5)*0.00003;
    this.wz+=(hash((t+this.pulsePhase)*0.0029+2)-.5)*0.00003;
    this.pulsePhase+=this.pulseSpeed;
  }
  project(ry, rx, Rv, cx, cy) {
    const cosY=Math.cos(ry),sinY=Math.sin(ry);
    const x1=this.ux*cosY+this.uz*sinY, y1=this.uy, z1=-this.ux*sinY+this.uz*cosY;
    const cosX=Math.cos(rx),sinX=Math.sin(rx);
    return { px:cx+x1*Rv, py:cy+(y1*cosX-z1*sinX)*Rv, fz:y1*sinX+z1*cosX };
  }
}

const dots  = Array.from({length: N},       (_, i) => new Dot(i));
const inner = Array.from({length: N_INNER}, (_, i) => new InnerDot(i));

let globalT=0, spawnClock=0;
const SPAWN_DURATION=520;
let rotY=0, rotX=0.28, rotSpeedY=0.0014;
let targetSpeedY=0.0014, targetRotX=0.28;
let phase='spawn';

// Inertia velocities for free spin after drag
let inertiaX = 0, inertiaY = 0;

function animate() {
  globalT++;
  ctx.clearRect(0, 0, W, H);
  const cx=W/2, cy=H/2;
  const Rv=breathRadius(globalT);

  if (phase==='spawn') {
    spawnClock=Math.min(1, globalT/SPAWN_DURATION);
    for(const d of dots){if(!d.alive&&d.spawnT<=spawnClock)d.alive=true; if(d.alive)d.opacity=Math.min(1,d.opacity+d.fadeSpeed);}
    for(const d of inner){if(!d.alive&&d.spawnT<=spawnClock)d.alive=true; if(d.alive)d.opacity=Math.min(1,d.opacity+d.fadeSpeed);}
    if(spawnClock>=1&&dots.every(d=>d.opacity>=0.95))phase='rotate';
  }

  if (drag.active) {
    // While dragging: freeze auto-rotation, zero inertia accumulation
    inertiaX = drag.velY * 0.005;
    inertiaY = drag.velX * 0.005;
  } else {
    // Apply inertia and decay
    rotX -= inertiaX;
    rotY += inertiaY;
    inertiaX *= 0.92;
    inertiaY *= 0.92;

    // Auto-rotation only kicks in when inertia is nearly gone
    const inertiaStrength = Math.abs(inertiaX) + Math.abs(inertiaY);
    if (inertiaStrength < 0.0005) {
      if (phase==='rotate') {
        if(globalT%210===0){
          targetSpeedY=0.0007+hash(globalT*0.017)*0.0025;
          targetRotX=0.1+hash(globalT*0.011+3)*0.6;
        }
        rotSpeedY+=(targetSpeedY-rotSpeedY)*0.0015;
        rotX+=(targetRotX-rotX)*0.0008;
        rotY+=rotSpeedY;
      }
    }

    if(phase==='rotate'){
      for(const d of dots){d.alive=true; d.opacity=Math.min(1,d.opacity+d.fadeSpeed);}
      for(const d of inner){d.alive=true; d.opacity=Math.min(1,d.opacity+d.fadeSpeed);}
    }
  }

  rotX=Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));

  for(const d of inner) if(d.alive) d.update(globalT);

  const all=[];
  for(const d of dots){
    if(!d.alive||d.opacity<=0)continue;
    const p=d.project(rotY,rotX,Rv,cx,cy,globalT);
    all.push({type:'surface',d,...p});
  }
  for(const d of inner){
    if(!d.alive||d.opacity<=0)continue;
    const p=d.project(rotY,rotX,Rv,cx,cy);
    all.push({type:'inner',d,...p});
  }
  all.sort((a,b)=>a.fz-b.fz);

  for(const item of all){
    const {d,px,py,fz}=item;
    const depth=(fz+1)/2;
    const depthSz=0.22+depth*0.78;
    const depthAlp=item.type==='surface'
      ? 0.06+depth*0.94
      : (0.03+depth*0.32)*Math.max(0.1,1.3-d.ur*0.6);

    d.pulsePhase+=d.pulseSpeed;
    const pulse=1+Math.sin(d.pulsePhase)*d.pulseAmt;

    const dx=px-mouse.x, dy=py-mouse.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const targetHover=dist<HOVER_RADIUS?SCALE_MAX:1.0;
    d.hoverScale+=(targetHover-d.hoverScale)*SCALE_SPEED;

    const r=Math.max(0.3,d.baseSize*depthSz*pulse*d.hoverScale);
    const a=d.opacity*depthAlp;
    if(a<0.008)continue;

    ctx.beginPath();
    ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a.toFixed(3)})`;
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
